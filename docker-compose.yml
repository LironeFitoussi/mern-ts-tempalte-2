services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: mern-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-mern_db}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      # Named volume for persistent data
      - mongodb_data:/data/db
      # Bind mount for initialization scripts (optional)
      - ./Server/mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - mern-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "none"

  # Express Backend Server
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
      target: development
    container_name: mern-server
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=${SERVER_PORT:-3000}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
      - MONGO_URI=${MONGO_URI:-mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_DATABASE:-mern_db}?authSource=admin}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID:-}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET:-}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    volumes:
      # Bind mount for hot reload - source code changes reflect immediately
      - ./Server/src:/app/src
      - ./Server/package.json:/app/package.json
      - ./Server/tsconfig.json:/app/tsconfig.json
      # Named volume for node_modules (performance optimization)
      - server_node_modules:/app/node_modules
    networks:
      - mern-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend Client
  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      target: development
    container_name: mern-client
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
      - VITE_API_URL=${VITE_API_URL:-}
      - VITE_PROXY_TARGET=http://server:3000
      - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN:-}
      - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID:-}
      - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE:-}
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    volumes:
      # Bind mount for hot reload - source code changes reflect immediately
      - ./Client/src:/app/src
      - ./Client/public:/app/public
      - ./Client/index.html:/app/index.html
      - ./Client/vite.config.ts:/app/vite.config.ts
      - ./Client/package.json:/app/package.json
      - ./Client/tsconfig.json:/app/tsconfig.json
      - ./Client/tsconfig.app.json:/app/tsconfig.app.json
      - ./Client/tsconfig.node.json:/app/tsconfig.node.json
      - ./Client/components.json:/app/components.json
      # Named volume for node_modules (performance optimization)
      - client_node_modules:/app/node_modules
    networks:
      - mern-network
    depends_on:
      - server

# Named Volumes (persistent data)
volumes:
  mongodb_data:
    driver: local
  server_node_modules:
    driver: local
  client_node_modules:
    driver: local

# Docker Network
networks:
  mern-network:
    driver: bridge
    name: mern-network

