services:
  server:
    build:
      context: .
      target: development
    container_name: mern-server
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - server_node_modules:/app/node_modules
    networks:
      - mern-network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

volumes:
  server_node_modules:

networks:
  mern-network:
    driver: bridge
