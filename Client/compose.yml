services:
  client:
    build:
      context: .
      target: development
    container_name: mern-client
    restart: unless-stopped
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - client_node_modules:/app/node_modules
    networks:
      - mern-network
    depends_on:
      - server
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./public
          target: /app/public
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json

volumes:
  client_node_modules:
