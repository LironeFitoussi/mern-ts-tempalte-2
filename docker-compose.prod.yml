services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7.0
    container_name: mern-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-mern_db}
    volumes:
      # Named volume for persistent data
      - mongodb_data_prod:/data/db
    networks:
      - mern-network-prod
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    # No exposed ports in production (internal network only)
    # ports:
    #   - "27017:27017"

  # Express Backend Server
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
      target: production
    container_name: mern-server-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=${SERVER_PORT:-3000}
      - CLIENT_URL=${CLIENT_URL}
      - MONGO_URI=${MONGO_URI:-mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-mern_db}?authSource=admin}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - AUTH0_CLIENT_ID=${AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${AUTH0_CLIENT_SECRET}
    ports:
      - "${SERVER_PORT:-3000}:3000"
    networks:
      - mern-network-prod
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # React Frontend Client
  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      target: production
    container_name: mern-client-prod
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "${CLIENT_PORT:-80}:80"
    networks:
      - mern-network-prod
    depends_on:
      - server
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

# Named Volumes (persistent data)
volumes:
  mongodb_data_prod:
    driver: local

# Docker Network
networks:
  mern-network-prod:
    driver: bridge
    name: mern-network-prod

